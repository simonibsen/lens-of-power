# ============================================================================
# patterns.yaml — Pattern corroboration data
# ============================================================================
#
# Each entry is a pattern. Prose definitions (statement, mechanism, notes)
# stay in the markdown files. This YAML captures:
#   - observed_in: the corroboration trail
#   - counter_evidence: links to evidence entries that challenge the pattern
#   - confidence fields: computed by tooling from observed_in + config thresholds
#
# --- IMPORTANT: observed_in is COMPUTED ---
#
# Do not hand-edit observed_in. It is a materialized view built by tooling
# from two authoritative sources:
#   1. analyses.yaml patterns_matched (each analysis lists its matched patterns)
#   2. principles.yaml key_patterns (each principle source lists its key patterns)
#
# Both sources are structured (with note and variant fields). Tooling copies
# all fields from the source into the observed_in entry.
#
# --- IMPORTANT: counter_evidence is COMPUTED ---
#
# Do not hand-edit counter_evidence. It is built by tooling from
# evidence.yaml — specifically, evidence entries where relationship is
# "challenges" or "complicates" and the pattern is in their patterns list.
#
# --- Confidence computation ---
#
# Confidence levels (ESTABLISHED, SUPPORTED, PRELIMINARY) are COMPUTED,
# never set manually. Tooling reads observed_in counts, computes ratios
# against the relevant corpus, and applies thresholds from config.yaml.
#
# "Relevant corpus" = count of (analyses + principles) whose layers overlap
# with at least one of the pattern's layers. Evidence entries are NOT counted.
#
# --- Pattern ID rules ---
#
# IDs are snake_case with leading articles ("The", "A") stripped.
# "The Capture Pipeline" -> capture_pipeline
# "The Boomerang" -> boomerang
# "Inversion of Stated Purpose" -> inversion_of_stated_purpose
# The `name` field preserves the full display name.
#
# --- Field reference ---
#
# id: string (required) — unique identifier, see ID rules above
# name: string (required) — display name including articles
# file: string|null (optional) — path to pattern markdown file, null until split
# layers: list[string] (required) — from config.yaml layers
# statement: string (required) — one-line pattern statement from patterns/INDEX.md
# circumventions: list[string] (optional) — circumvention IDs that counteract this
# originated_by: string|null (optional) — principle ID that first proposed this pattern
# observed_in: list[object] (COMPUTED) — see subfields below
#   .source_id: string — analysis or principle ID
#   .source_type: "analysis"|"principle"
#   .variant: string|null — named variant, or null for base pattern
#   .note: string — how pattern manifests in this source
# counter_evidence: list[string] (COMPUTED) — evidence entry IDs
# confidence_ratio: float|null (COMPUTED) — observed_in count / relevant corpus
# confidence_level: string|null (COMPUTED) — ESTABLISHED | SUPPORTED | PRELIMINARY
# relevant_corpus_size: int|null (COMPUTED) — sources sharing >= 1 layer
