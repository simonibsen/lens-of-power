# ============================================================================
# principles.yaml — Extracted principle sources
# ============================================================================
#
# Each entry is a source from which principles have been extracted. The
# prose lives in principles/*.md; this is the structured index.
#
# Replaces principles/INDEX.md as the source of truth for cross-referencing.
# principles/INDEX.md can be generated from this file if needed.
#
# key_patterns entries here are one of two authoritative sources for
# patterns.yaml observed_in (the other is analyses.yaml patterns_matched).
# Tooling reads key_patterns to build the pattern corroboration trail.
# key_patterns is structured (with note and variant) so tooling can copy
# all fields into patterns.yaml observed_in entries.
#
# --- Field reference ---
#
# id: string (required) — unique identifier, matches filename stem
# file: string (required) — path to principles markdown file
# source_name: string (required) — author name
# source_title: string (required) — work title
# source_year: int (required) — publication year
# position: list[int] (required) — positional lens, e.g. [5] or [2, 5]
# position_note: string (required) — description of position
# provenance_tier: string (required) — from config.yaml provenance_tiers
# layers: list[string] (required) — from config.yaml layers
# principles_list: list[string] (required) — extracted principles with glosses
# key_patterns: list[object] (required) — patterns this source corroborates
#   .pattern: string — pattern ID
#   .variant: string|null — named variant, or null
#   .note: string — how the pattern manifests in this source
# ic1_flags: list[object] (optional) — axiom challenges found
#   .axiom: int — axiom number
#   .note: string — description of the challenge
# instruments_proposed: list[string] (optional) — instrument IDs proposed
# instruments_produced: list[string] (optional) — instrument IDs completed

