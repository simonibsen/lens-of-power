  principles_count: 8
  principles_list:
  - "The Dual Architecture of Dominance: Consent + Coercion"
  - Common Sense as Invisible Infrastructure
  - The Organic Intellectual Personnel System
  - "Passive Revolution: The Absorption of Challenges"
  - The Asymmetry of Institutional Response Time
  - "Civil Society as Deep Defence: The Fortresses-and-Earthworks Principle"
  - The Three-Level Analysis of Force Relations
  - The Generational Timescale of Hegemonic Construction
  key_patterns:
  - pattern: appearance_as_structural_terrain
    variant: null
    note: 'Common sense is the terrain. The gap between the hegemonic system''s self-presentation (universal interest) and its operation (dominant group interest with genuine but asymmetric concessions to subordinate groups) is the environment in which hegemony operates.'
  - pattern: formal_transformation_structural_continuity
    variant: null
    note: 'Passive revolution: the form of change without the content. Challenges are metabolised through molecular incorporation — co-optation of oppositional personnel, partial adoption of rhetoric, strategic concessions — while fundamental power arrangements persist.'
  - pattern: institutional_abdication
    variant: 'crisis of hegemony — parties detach from class base'
    note: 'The crisis of hegemony: social classes detach from their traditional parties, institutions cease to represent their constituency. The field opens to charismatic leaders and violent solutions. The ruling class reabsorbs control faster than challengers organise.'
  - pattern: anticipatory_obedience
    variant: null
    note: 'The organic intellectual system produces individuals who anticipate and advance the hegemonic programme through sincere professional practice. The teacher, journalist, administrator enforce hegemony not through orders but through common sense absorbed during professional formation.'
  - pattern: middle_stratum_trap
    variant: null
    note: 'Organic intellectuals of the subaltern classes are systematically assimilated by the dominant formation. The most capable individuals from subordinate groups are absorbed into the dominant intellectual stratum, preventing subaltern autonomous intellectual leadership.'
  - pattern: layered_redundancy_of_control
    variant: null
    note: 'Civil society as deep defence: school, church, media, professional associations, cultural norms, moral standards each independently reproduce the hegemonic framework. Failure of any one mechanism is caught by the others. The State is the outer ditch; civil society is the fortresses and earthworks.'
  - pattern: capture_pipeline
    variant: 'hegemonic — assimilation of traditional intellectuals and passive revolution'
    note: 'Each successive dominant formation captures the traditional intellectuals of the prior formation. Passive revolution captures oppositional energy — challenges are metabolised, personnel co-opted, rhetoric adopted, structure preserved.'
  - pattern: double_performance
    variant: null
    note: 'The hegemonic group performs universal interest while pursuing corporate interest. The subordinate group performs consent while maintaining awareness of the arrangement. The performance is mutual and both sides participate in maintaining it.'
  ic1_flags:
  - axiom: 3
    note: 'Common sense as a fifth mode of invisible power: the background ontology that determines the thinkable. Not a hidden mechanism (the institutions are visible), not degraded perception (the subjects perceive accurately within the frame), but a frame so deeply sedimented across generations that it is experienced as reality itself.'
  - axiom: 5
    note: 'Complicates: durable power concentration requires genuine concession to subordinate groups. The hegemonic group''s interests prevail but only up to a certain point — real coordination with subordinate interests is necessary. The axiom''s directive ("at whose expense?") may miss cases where expense is distributed across society while accumulation benefits the dominant disproportionately but not exclusively.'
  - axiom: 10
    note: 'Specifies the conditions: understanding resists only when organised through institutional infrastructure (alternative personnel system) and sustained across generational timescales (war of position). Understanding without institutional organisation is structurally impotent. This defines when Axiom 10 holds and when it fails.'
