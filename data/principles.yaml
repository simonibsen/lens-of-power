  - "The Alternative: Mutual Aid Over Insulation"
  key_patterns:
  - pattern: wealth_defense_industry
    variant: 'post-civilisational — extended past the system boundary'
    note: 'The bunker industry is the Wealth Defense Industry for the post-social-contract world. Bunker builders, tactical vehicle manufacturers, and survival consultants are the post-civilisational wealth managers.'
  - pattern: peacetime_ratchet
    variant: 'terminal logic — concentration enables exit'
    note: 'The ratchet has concentrated wealth to the point where beneficiaries can price in system collapse. The bunker is the ratchet''s endpoint: not accumulating more than others but accumulating survival as a private good.'
  - pattern: appearance_as_structural_terrain
    variant: null
    note: 'Tech elite''s public narrative (innovation for everyone, technology as progress) coexists with private preparation (bunkers, escape plans, New Zealand citizenship). The gap is the operating environment.'
  - pattern: double_performance
    variant: null
    note: 'The tech elite perform system confidence (investing, building, promoting) while preparing for system failure (bunkers, escape). Rushkoff witnessed both performances from the same individuals in the same meeting.'
  - pattern: division_of_learning
    variant: null
    note: 'The ultra-wealthy have better access to risk assessment and modelling. Their escape preparation is a product of information asymmetry — knowing more about the system''s trajectory than the populations who bear its consequences.'
  - pattern: democracy_oligarchy_coexistence
    variant: null
    note: 'The escape fantasy operates entirely in the private sphere, unconstrained by democratic mechanisms. No electoral process addresses elite exit from the social contract.'
  - pattern: constitutive_violence
    variant: 'pre-positioned — planned transition from consent to coercion'
    note: 'The security-force problem reveals that post-collapse authority would depend on direct physical coercion. Shock collars, food-supply locks, robot guards — mechanisms of constitutive violence planned in advance of the system''s failure.'
  ic1_flags:
  - axiom: 3
    note: 'The Mindset is a specific instance of hegemonic naturalisation (fifth mode) — the cognitive framework makes escape appear rational and systemic repair appear impossible. The framework within which alternatives are assessed is itself a product of the system producing the crises.'
  - axiom: 9
    note: 'Complicates: the axiom describes how compliance is manufactured in the governed. Rushkoff documents how exit fantasies are manufactured in the governors. Power produces not only compliance below but escape above. The axiom''s scope may need extension.'
  - axiom: 10
    note: 'The billionaires understand the system''s trajectory clearly (they know it may collapse) but understanding produces exit rather than repair. Fisher''s reflexive impotence applied to the ruling class: knowledge of the problem produces flight, not action.'
