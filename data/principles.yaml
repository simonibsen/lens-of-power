  principles_count: 6
  principles_list:
  - Prevention Through Deterrence as Structural Violence
  - Necroviolence
  - Hostile Terrain as Delegated Violence
  - "The Spectacle of Enforcement vs. the Architecture of Death"
  - The Body as Evidence and Its Erasure
  - Migrant Agency Within Lethal Constraint
  key_patterns:
  - pattern: inversion_of_stated_purpose
    variant: null
    note: 'PTD is the strongest Axiom 7 case in the corpus — "border security" policy whose structural function is producing death through environmental delegation. Policy architects acknowledged the death toll as an expected outcome.'
  - pattern: appearance_as_structural_terrain
    variant: null
    note: 'Visible border enforcement (walls, patrols, checkpoints) coexists with invisible funneling architecture that channels migrants into lethal terrain. The spectacle serves domestic politics; the architecture serves enforcement through death.'
  - pattern: constitutive_violence
    variant: null
    note: 'The border enforcement regime is constituted through violence — not incidental but structurally necessary. The desert crossing is not a side effect of enforcement but its primary mechanism.'
  - pattern: economy_of_violence
    variant: 'environmental delegation — violence concentrated at crossing, absent for survivors'
    note: 'Violence concentrated at the moment of crossing, performed by environment rather than agents. Survivors face exploitation but not lethal coercion. Temporal calibration: maximum lethality at the boundary, invisibility thereafter.'
  - pattern: hidden_transcript
    variant: null
    note: 'Migrant route knowledge, survival strategies, mutual aid networks, and shared intelligence about terrain constitute a hidden transcript of the border — counter-knowledge developed by those subjected to the system.'
  - pattern: compliance_gradient
    variant: 'lethal conditions — migration as navigating the gradient under mortal threat'
    note: 'Migrants navigate the compliance gradient under lethal conditions. The choice set is cross/stay, where both options carry severe consequences. Fourth Position 2/hybrid corroboration extending the gradient to lethal conditions.'
  - pattern: division_of_learning
    variant: null
    note: 'The state knows terrain lethality (used to design funneling corridors) while migrants learn routes through attrition. Border Patrol sensor arrays coexist with deliberate absence of search-and-rescue in killing zones.'
  - pattern: layered_redundancy_of_control
    variant: null
    note: 'PTD operates multiple control mechanisms simultaneously: legal prohibition, physical barriers, surveillance technology, environmental lethality, economic barriers (smuggling costs), and narrative framing. Failure at any one is caught by others.'
  ic1_flags:
  - axiom: 7
    note: 'Strongest corroboration in corpus — PTD is a policy whose stated purpose (deterrence/border security) diverges definitionally from its structural function (producing death through environmental delegation).'
  - axiom: 8
    note: 'Extends from "absence is significant" to "absence is actively manufactured." Necroviolence destroys evidence (bodies) connecting policy to death. Physical complement to Browne''s constitutive absence.'
  - axiom: 9
    note: 'Migrants see coercion clearly and cross anyway because the alternative is worse. Fourth independent Position 2/hybrid confirmation across fourth domain (border crossing).'
