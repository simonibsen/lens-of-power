- id: fisher-capitalist-realism
  file: principles/fisher-capitalist-realism.md
  source_name: Mark Fisher
  source_title: "Capitalist Realism: Is There No Alternative?"
  source_year: 2009
  position:
  - 3
  - 5
  position_note: "hybrid — cultural theorist as structural critic; FE lecturer with Position 2 proximity to effects on students/workers"
  provenance_tier: primary_document
  layers:
  - thought_narrative
  - institutional
  - economic
  - surveillance_information
  principles_count: 8
  principles_list:
  - Hegemonic Realism (The Atmosphere Principle)
  - Precorporation (Pre-Emptive Absorption of Dissent)
  - Reflexive Impotence (Knowledge as Paralysis)
  - The Privatisation of Systemic Costs
  - Market Stalinism (Representation Displacing Reality)
  - The Big Other (Constitutive Ignorance)
  - Centerlessness (Impersonal Structure as Accountability Shield)
  - Hegemonic Dreamwork (Confabulation as Systemic Maintenance)
  key_patterns:
  - pattern: appearance_as_structural_terrain
    variant: null
    note: 'Market Stalinism and the Big Other: the gap between official representations and operational reality is not a failure but the operating environment. Audit data performs for a symbolic order nobody believes in.'
  - pattern: structural_demand_for_propaganda
    variant: 'demand-side — reflexive impotence as need for framework'
    note: 'Reflexive impotence demonstrates the demand side: subjects need a framework that makes their acquiescence bearable. The system is sustained through its subjects'' need for coherence, even dysfunctional coherence.'
  - pattern: real_time_narrative_saturation
    variant: null
    note: 'Hegemonic dreamwork: contradictions are absorbed through confabulation rather than confronted. The system rewrites its history in real time, asserting one narrative today and its opposite tomorrow without rupture.'
  - pattern: inversion_of_stated_purpose
    variant: null
    note: 'Market Stalinism: metrics designed to measure performance instead displace it. "Freedom" and "choice" function as mechanisms of control. Audit becomes anti-production — more effort demonstrating function than functioning.'
  - pattern: anticipatory_obedience
    variant: 'internalised — devolved surveillance as self-assessment'
    note: 'Workers become their own panopticon through internalised audit. Self-assessment replaces external inspection but intensifies control — the subject anticipates requirements before they are imposed.'
  - pattern: division_of_learning
    variant: null
    note: 'The Big Other creates structural asymmetry between official knowledge and private knowledge. Everyone knows the system is dysfunctional; the official record does not register this knowledge.'
  - pattern: compliance_gradient
    variant: 'ontological — compliance through foreclosure of alternatives'
    note: 'Reflexive impotence positions subjects on the gradient not through coercion but through the elimination of the imaginative space for non-compliance. They comply because they cannot conceive of a viable alternative.'
  - pattern: manufactured_scarcity_as_control
    variant: 'scarcity of the thinkable'
    note: 'The system manufactures scarcity of alternatives — not material scarcity but ontological scarcity. The foreclosure of the imagination is a form of manufactured scarcity operating at the level of what can be thought.'
  - pattern: double_performance
    variant: null
    note: 'The Big Other requires a performance of belief nobody believes. Both the system and its subjects perform for an audience (the symbolic order) that both know is fictional, yet maintaining the fiction is structurally necessary.'
  ic1_flags:
  - axiom: 3
    note: 'Hegemonic realism as potential fifth mode: contingency not merely invisible but ontologically excluded. The system does not conceal alternatives; it makes the concept of "alternative" incoherent. Beyond hidden mechanism, hidden contingency, prohibitive cost, or degraded perception.'
  - axiom: 9
    note: 'Reflexive impotence: compliance manufactured through foreclosure of effective action, distinct from prohibitive cost (Terkel/Desmond/Ehrenreich) or concealed coercion (axiom''s current framing). Subjects see the coercion, understand it, comply because the imaginative space for non-compliance has been closed.'
  - axiom: 10
    note: 'Strongest challenge in the corpus. Understanding does not resist under conditions of hegemonic realism; it produces acquiescence. Knowledge of injustice becomes the mechanism of compliance. Goes beyond existing complications (Arendt, Ellul, Stanley, Browne) to argue understanding is structurally impotent under mature hegemonic conditions.'
