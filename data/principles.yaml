  principles_count: 6
  principles_list:
  - The Historical Contingency of Immigration Crime
  - "Crimmigration: The Hybrid Legal Architecture"
  - The Detention-Industrial Complex
  - The Impossibility of Compliance
  - Detention as Default
  - The Racial Architecture of Immigration Law
  key_patterns:
  - pattern: inversion_of_stated_purpose
    variant: null
    note: 'Immigration law''s stated purpose is managing migration for national benefit. Its documented function is producing a category of rightless people whose precarity serves economic and political interests.'
  - pattern: manufactured_scarcity_as_control
    variant: 'scarcity of legal pathways as control mechanism'
    note: 'Legal immigration pathways are structurally scarce — limited visa categories, decades-long wait times. The scarcity is a policy choice that produces unauthorized status by design.'
  - pattern: perpetual_threat_as_perpetual_justification
    variant: null
    note: 'The "illegal alien" functions as a permanent internal threat category justifying permanent enforcement architecture. The threat is structurally permanent because the legal architecture continuously produces unauthorized status.'
  - pattern: constitutive_violence
    variant: null
    note: 'The immigration enforcement system — detention, deportation, family separation — is constituted through violence. Imprisonment of immigrants is not a response to a problem but the production of a category of people subjected to state violence.'
  - pattern: compliance_gradient
    variant: 'impossible compliance — system produces violations by design'
    note: 'Immigration law positions all undocumented people on the compliance gradient under conditions where full compliance is structurally impossible. The system produces "illegal" status through structural design, not individual choice.'
  - pattern: formal_transformation_structural_continuity
    variant: null
    note: 'Racial exclusion formally eliminated in 1965. Racially differential enforcement persisted through geographic targeting, category construction, and enforcement priorities. Form changed; racial function continued.'
  - pattern: appearance_as_structural_terrain
    variant: null
    note: '"Rule of law" framing presents enforcement as neutral application of law. The structural finding: the law produces the law-breaking by making compliance impossible for many.'
  - pattern: capture_pipeline
    variant: null
    note: 'Private prison companies lobby for enforcement that produces detainees, fund supportive candidates, build facilities in advance of demand. The detention-industrial complex captures immigration policy.'
  - pattern: wealth_defense_industry
    variant: 'detention-industrial complex as extraction mechanism'
    note: 'Private prison industry extracts profit from immigration enforcement architecture. "Bed quotas" ensure the industry''s revenue stream.'
  ic1_flags:
  - axiom: 6
    note: 'The term "illegal alien" preceded and enabled the enforcement architecture. Linguistic shift from "immigrant" to "illegal" was the first step in criminalization. Language created the category; law followed.'
  - axiom: 7
    note: 'Immigration law''s stated purpose (managing migration) diverges from function (producing rightless people). Criminalization of border crossing is a policy choice, not a natural law.'
  - axiom: 4
    note: 'Criminalization of migration parallels vagrancy laws, pass laws, fugitive slave laws — all criminalized movement by specific populations to maintain labor control. Mechanism consistent; target population changes.'
