# Source pool for SAMPLE mode randomization.
#
# Entries are categorized by outlet type and tagged on five axes to enable
# coverage tracking. The pool includes sources likely to exhibit power
# dynamics alongside sources where power dynamics may be absent
# (null-case-likely), ensuring the framework's calibration sample space
# produces genuine null cases.
#
# This file replaces sources/sample-pool.md as the source of truth.
# sources/sample-pool.md is now generated from this file.
#
# Maintenance: Add entries when the pool's axis coverage has gaps. Remove
# entries only if an outlet ceases to exist. Do not curate for "relevance"
# -- the point is randomness.

axis_definitions:
  institution: [corporate, independent, wire, government, trade, local, nonprofit, academic]
  domain: [politics, economics, technology, culture, science, local-gov, sports, lifestyle, health, environment, military, legal]
  geo: [us-national, us-local, uk, eu, global-south, asia, middle-east, africa, non-anglophone]
  audience: [general, professional, investor, policymaker, academic]
  position: [1, 2, 3, 4, 5]

